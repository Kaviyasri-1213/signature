<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Signatures - Sign Up</title>

{% load bootstrap5 %}
{% bootstrap_css %}
{% bootstrap_javascript %}
{% load static %}

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #6262f3; 
        font-family: sans-serif;
        margin: 0;
    }

    .signup-container {
        background: #ffffff;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
        width: 350px;
        text-align: center;
    }

    .signup-container img.logo {
        width: 70px;
        height: 70px;
        margin-bottom: 15px;
    }

    .signup-container h1.title {
        font-size: 28px;
        margin-bottom: 25px;
        color: #003366;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }

    .signup-container form .form-label {
        font-weight: 500;
        text-align: left;
    }

    .signup-container form input.form-control {
        margin-bottom: 15px;
    }

    .signup-container .alert {
        margin-top: 10px;
    }

    .signup-container p {
        margin-top: 15px;
    }
</style>
</head>
<body>

<div class="signup-container">
    <img src="{% static 'logo.png' %}" class="logo" alt="Logo">
    <h1 class="title">GOLDEN SIGNATURES</h1>

    <h2>Sign Up</h2>
    <form action="{% url 'signup' %}" method="POST">
        {% csrf_token %}
        <div class="mb-3 text-start">
            <label for="user" class="form-label">Username</label>
            <input type="text" id="user" name="user" placeholder="Enter username" class="form-control" required>
        </div>
      <div class="mb-3 text-start position-relative">
    <label for="password" class="form-label">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter password" class="form-control" required>
    <button type="button" class="togglePassword" style="
        position: absolute;
        right: 10px;
        top: 38px;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 14px;
        color: #333;
    ">Show</button>
</div>

<div class="mb-3 text-start position-relative">
    <label for="rpass" class="form-label">Confirm Password</label>
    <input type="password" id="rpass" name="rpass" placeholder="Re-enter password" class="form-control" required>
    <button type="button" class="togglePassword" style="
        position: absolute;
        right: 10px;
        top: 38px;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 14px;
        color: #333;
    ">Show</button>
</div>


        
       
        
        <div class="mb-3 text-start">
            <label for="epass" class="form-label">Email Address</label>
            <input type="email" id="epass" name="epass" placeholder="Enter email" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign Up</button>
    </form>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
</div>
<script>
const toggleButtons = document.querySelectorAll(".togglePassword");

toggleButtons.forEach(function(button){
    button.addEventListener("click", function(){
        const input = this.previousElementSibling; 
        if(input.type === "password"){
            input.type = "text";
            this.textContent = "Hide";
        } else {
            input.type = "password";
            this.textContent = "Show";
        }
    });
});
</script>


</body>
</html>
