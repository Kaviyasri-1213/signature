<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Employee</title>

{% load bootstrap5 %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<style>
body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:#e0f0ff;
font-family:sans-serif;
margin:0;
}
.form-container{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
width:1000px;
}
h2{
text-align:center;
color:#003366;
margin-bottom:20px;
}
.required{
color:red;
font-weight:bold;
}
small{
font-size:12px;
}
</style>

<script>

function onlyNumbers(input){
  input.value = input.value.replace(/[^0-9]/g,'');
}

function onlyLetters(input){
  input.value = input.value.replace(/[^A-Za-z\s]/g,'');
}


function validateAge(input){
  if(input.value.length > 2) input.value = input.value.slice(0,2);
  if(input.value < 18 || input.value > 60){
    document.getElementById("ageError").innerText = "Age must be 18–60";
  } else {
    document.getElementById("ageError").innerText = "";
  }
}

function validateHours(input){
  input.value = input.value.replace(/\D/g,''); 
  input.value = Math.floor(input.value);
  if(input.value < 1 || input.value > 24){
    document.getElementById("hourError").innerText = "Worked hours must be integer 1–24";
  } else {
    document.getElementById("hourError").innerText = "";
  }
}

function validateEmail(input){
  const regex = /^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/i;
  if(input.value && !regex.test(input.value)){
    document.getElementById("emailError").innerText = "Invalid email format e.g., example@domain.com";
  } else {
    document.getElementById("emailError").innerText = "";
  }
}
function validateWorkedHours(input){
    input.value = input.value.replace(/\D/g,'');
    let val = parseInt(input.value);
    if(val < 1 || val > 24){
        document.getElementById("hourError").innerText = "Worked hours must be integer 1–24";
    } else {
        document.getElementById("hourError").innerText = "";
    }
    input.value = val ? val : '';
}

function checkForm(form){
  const ageError = document.getElementById("ageError").innerText;
  const hourError = document.getElementById("hourError").innerText;
  const emailError = document.getElementById("emailError").innerText;
  if(ageError || hourError || emailError){
    alert("Fix errors before updating!");
    return false;
  }
  return true;
}
function validateAddress(input){
    let val = input.value;
    let match = val.match(/^(\d{0,3})([A-Za-z\s]*)$/);

    if(match){
        let houseNo = match[1];
        let letters = match[2];
        letters = letters.replace(/[^A-Za-z\s]/g,'');
        input.value = houseNo + letters;

        document.getElementById("addressError").innerText = "";
    } else {
        input.value = val.replace(/[^0-9A-Za-z\s]/g,'');
        document.getElementById("addressError").innerText = "Only 1–3 digits allowed at start, rest letters";
    }
}
</script>

</head>
<body>

<div class="form-container">

<h2>Edit Employee</h2>

<form method="POST" novalidate onsubmit="return checkForm(this)">
{% csrf_token %}


<div class="mb-3">
<label>Name <span class="required">*</span></label>
<input type="text" name="name" class="form-control" maxlength="50" value="{{ emp.name }}"
oninput="onlyLetters(this)" required>
<small class="text-danger">Only letters, max 50 chars</small>
</div>
<div class="mb-3">
<label>Age <span class="required">*</span></label>
<input type="number" name="age" class="form-control" min="18" max="60" value="{{ emp.age }}"
oninput="validateAge(this)" required>
<small id="ageError" class="text-danger"></small>
</div>

<div class="mb-3">
<label>Email <span class="required">*</span></label>
<input type="email" name="email" class="form-control" maxlength="100" value="{{ emp.email }}"
oninput="validateEmail(this)" required>
<small id="emailError" class="text-danger"></small>
</div>


<div class="mb-3">
<label>Phone <span class="required">*</span></label>
<div class="input-group">
<span class="input-group-text">+91</span>
<input type="tel" name="phone" class="form-control" maxlength="10" value="{{ emp.phone }}"
oninput="onlyNumbers(this)" required>
</div>
<small class="text-danger">10 digits only</small>
</div>

<div class="mb-3">
<label>Gender</label>
<select name="gender" class="form-select" required>
<option value="">Select Gender</option>
<option value="Male" {% if emp.gender == "Male" %}selected{% endif %}>Male</option>
<option value="Female" {% if emp.gender == "Female" %}selected{% endif %}>Female</option>
<option value="Other" {% if emp.gender == "Other" %}selected{% endif %}>Other</option>
</select>
</div>


<div class="mb-3">
<label>Address <span class="required">*</span></label>
<input type="text" name="address" class="form-control"
maxlength="100"
placeholder="House No (1–3 digits) Street Name"
oninput="validateAddress(this)"
value="{{ emp.address|default:'' }}"
required>
<small id="addressError" class="text-danger">House No: 1–3 digits, then letters only</small>
</div>


<div class="mb-3">
<label>Aadhaar Number <span class="required">*</span></label>
<input type="text" name="adhar_number" class="form-control" maxlength="14" value="{{ emp.adhar_number }}"
oninput="onlyNumbers(this)" required>
<small class="text-danger">14 digits only</small>
</div>
<label>Worked Hours <span class="required">*</span></label>
<input type="text" name="worked_hours" class="form-control"
value="{{ emp.worked_hours }}"
oninput="validateWorkedHours(this)"
required>
<small id="hourError" class="text-danger"></small>
</div>

<div class="mt-4 text-center">
<button type="submit" class="btn btn-primary me-3">Update Employee</button>
<a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
</div>

</form>
</div>
</body>
</html>
